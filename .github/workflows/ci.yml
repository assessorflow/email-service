name: CI — Email Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  SERVICE_NAME: email-service

jobs:
  # ================================================================
  # Stage 1: Build + Tests
  # ================================================================
  test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run all tests
        run: mvn test -Dspring.profiles.active=test -B

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/

  # ================================================================
  # Stage 2: SAST
  # ================================================================
  sast-codeql:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: java

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - run: mvn clean compile -DskipTests -B

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:java
        continue-on-error: true

  sast-spotbugs:
    name: SAST — SpotBugs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - run: mvn compile spotbugs:check -B
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: target/spotbugs.html
          if-no-files-found: ignore

  # ================================================================
  # Stage 3: SCA + Secrets
  # ================================================================
  sca:
    name: SCA — OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - run: mvn dependency-check:check -DnvdApiKey=${{ secrets.NVD_API_KEY }} -B
        continue-on-error: true
        timeout-minutes: 10

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 7

  secret-scan:
    name: Secret Scanning — TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  # ================================================================
  # Stage 4: Build + Container Scan
  # ================================================================
  build:
    name: Build + Container Scan
    runs-on: ubuntu-latest
    needs: [test, sast-spotbugs, sca, secret-scan]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - run: mvn clean package -DskipTests -B

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: ${{ env.SERVICE_NAME }}:${{ github.sha }}

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SERVICE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: "CRITICAL"
