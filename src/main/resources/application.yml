server:
  port: 8084
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  application:
    name: email-service
  # No default profile — set explicitly per environment:
  # Local: -Dspring.profiles.active=dev | Docker: SPRING_PROFILES_ACTIVE=docker | GKE: SPRING_PROFILES_ACTIVE=prod
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    gcp:
      project-id: ${GCP_PROJECT_ID:accessorflow}
      pubsub:
        subscriber:
          parallel-pull-count: 1
          max-ack-extension-period: 60

# Pub/Sub subscriptions
app:
  pubsub:
    assessor-review:
      request-subscription: assessorflow.email.request.assessor-review.sub
      deliver-subscription: assessorflow.email.deliver.assessor-review.sub
      deliver-topic: assessorflow.email.deliver.assessor-review
    assessment-link:
      request-subscription: assessorflow.email.request.assessment-link.sub
      deliver-subscription: assessorflow.email.deliver.assessment-link.sub
      deliver-topic: assessorflow.email.deliver.assessment-link
    participant-report:
      request-subscription: assessorflow.email.request.participant-report.sub
      deliver-subscription: assessorflow.email.deliver.participant-report.sub
      deliver-topic: assessorflow.email.deliver.participant-report

# AWS SES — credentials resolved via DefaultCredentialsProvider
# (env vars AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY, or IAM role in prod)
aws:
  region: ${AWS_REGION:ap-southeast-1}
  ses:
    from-email: ${AWS_SES_FROM_EMAIL:noreply@assessorflow.online}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
