server:
  port: 8084

spring:
  application:
    name: email-service
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    gcp:
      project-id: accessorflow
      pubsub:
        subscriber:
          parallel-pull-count: 1
          max-ack-extension-period: 0

# Pub/Sub subscriptions
app:
  pubsub:
    assessor-review:
      request-subscription: assessorflow.email.request.assessor-review.sub
      deliver-subscription: assessorflow.email.deliver.assessor-review.sub
      deliver-topic: assessorflow.email.deliver.assessor-review
    assessment-link:
      request-subscription: assessorflow.email.request.assessment-link.sub
      deliver-subscription: assessorflow.email.deliver.assessment-link.sub
      deliver-topic: assessorflow.email.deliver.assessment-link
    participant-report:
      request-subscription: assessorflow.email.request.participant-report.sub
      deliver-subscription: assessorflow.email.deliver.participant-report.sub
      deliver-topic: assessorflow.email.deliver.participant-report

# AWS SES
aws:
  region: ${AWS_REGION:ap-southeast-1}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
  ses:
    from-email: ${AWS_SES_FROM_EMAIL:chronoflow2025@gmail.com}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
